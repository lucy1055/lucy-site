<!DOCTYPE html>
<html>
<head>
  <title>Lucy Reply</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    input {
      padding: 10px;
      width: 250px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-left: 10px;
      cursor: pointer;
    }

    #response {
      margin-top: 20px;
      font-size: 20px;
      color: red;
    }
  </style>
</head>
<body>

  <h2>Say something to Lucy</h2>

  <input type="text" id="userInput" placeholder="Type here..." />
  <button onclick="checkMessage()">Send</button>

  <p id="response"></p>

  <script>
    function checkMessage() {
      const input = document.getElementById("userInput").value.trim().toLowerCase();
      const output = document.getElementById("response");

      if (input === "what is your name") {
        output.innerText = "my name is lucy ❤️";
      } else {
        output.innerText = "Lucy didn't respond 😐";
      }
    }
  </script>

</body>
</html>
